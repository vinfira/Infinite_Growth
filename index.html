<!DOCTYPE html>                      <!-- Teilt dem Browser mit: das ist ein modernes HTML5-Dokument -->
<html lang="de">                     <!-- Startet das HTML-Dokument, Sprache auf Deutsch gesetzt -->
<head>                               <!-- Kopfbereich: unsichtbare Einstellungen der Seite -->
  <meta charset="UTF-8">             <!-- Zeichenkodierung: erlaubt Umlaute und Sonderzeichen -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Macht die Seite auf Mobilgeräten korrekt skaliert -->
  <title>Infinite Growth</title>     <!-- Text der im Browser-Tab angezeigt wird -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"> <!-- Lädt die Schriftart "Space Mono" von Google Fonts -->
  <link rel="stylesheet" href="style.css"> <!-- Bindet die externe CSS-Datei ein (Styling) -->
</head>
<body>                               <!-- Sichtbarer Inhalt der Seite beginnt hier -->

<canvas id="canvas"></canvas>        <!-- Die Zeichenfläche – hier passiert die gesamte Animation -->

<div id="ui">                        <!-- Container für alle UI-Texte, liegt über dem Canvas -->
  <div id="label">                   <!-- Titelblock oben links -->
    <div class="sub">Interface Design</div>          <!-- Kleiner Untertitel über dem Haupttitel -->
    <h1>Infinite Growth<span class="dot"></span></h1> <!-- Haupttitel + grüner Akzentpunkt -->
  </div>
  <div id="corner">&#8734;</div>
  <div id="season-label">SPRING</div> <!-- Aktuelle Jahreszeit – wird per JavaScript aktualisiert -->     <!-- Unendlichkeitszeichen (∞) oben rechts -->
  <div id="hint">— set points, grow connections —</div> <!-- Erster Hinweistext für den User -->
  <div id="hint2">double-click to clear</div>           <!-- Zweiter Hinweis, erscheint nach erstem Klick -->
  <div id="stats"></div>             <!-- Statistikanzeige – wird per JavaScript befüllt -->
  <!-- NEU: kleine Statusanzeige für die Kamera (passt sich farblich an, stört die Optik nicht) -->
  <div id="cam-status" style="position:fixed;bottom:18px;left:48px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.25);pointer-events:none;z-index:20;">camera: off</div>
</div>

<script src="script.js"></script>    <!-- Bindet die externe JavaScript-Datei ein (Logik & Animation) -->

<!-- ════════════════════════════════════════════════════════════════
     NEU: Handtracking. Liegt komplett hier in der index.html.
     style.css und script.js bleiben unverändert.
     Es simuliert echte Maus-Ereignisse, daher reagiert script.js normal.
     ════════════════════════════════════════════════════════════════ -->
<script type="module">
import { FilesetResolver, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14"; // MediaPipe-Bibliothek direkt per CDN laden (kein Build nötig)

const canvas = document.getElementById("canvas");   // Dein Canvas holen – darauf werden die simulierten Maus-Events ausgelöst
const status = document.getElementById("cam-status"); // Die neue Statusanzeige holen

const video = document.createElement("video");       // Verstecktes Video-Element für den Kamera-Stream erstellen
video.style.display = "none";                        // Video nicht anzeigen – wir nutzen nur die Bilddaten
document.body.appendChild(video);                    // Element in die Seite einhängen (nötig, damit es Frames liefert)

let handLandmarker;                                  // Hier wird gleich das geladene Hand-Modell gespeichert
let lastPinch = false;                               // Merkt sich, ob im letzten Frame schon gepincht wurde (verhindert Dauerfeuer)
const PINCH_DISTANCE = 0.06;                          // Schwelle: wie nah Daumen + Zeigefinger sein müssen, damit es als "Klick" zählt

// ── Zustand für die Glättung (smoother Cursor) ──────────────────
let smoothX = null, smoothY = null;                  // Geglättete Cursor-Position (folgt der Hand verzögert)
const SMOOTHING = 0.20;                               // Wie schnell der Cursor der Hand folgt: 1 = sofort/wackelig, klein = sehr glatt aber träge

// ── Zustand für die Winke-Geste (Löschen) ───────────────────────
let prevWristX = null;                               // Letzte horizontale Position des Handgelenks (zum Vergleich)
let prevDir = 0;                                     // Letzte Bewegungsrichtung: -1 = links, +1 = rechts, 0 = noch keine
let reversals = [];                                  // Zeitpunkte der letzten Richtungswechsel (Kern des Winkens)
let lastWaveTime = 0;                                // Zeitpunkt des letzten ausgelösten Winkens (für Abklingzeit)
const WAVE_MIN_STEP = 0.018;                          // Mindest-Bewegung, damit sie zählt (filtert kleines Zittern weg)
const WAVE_WINDOW = 1500;                             // Zeitfenster in ms, in dem die Richtungswechsel passieren müssen
const WAVE_REVERSALS = 4;                             // Nötige Richtungswechsel (≈ 2 volle Hin-und-Her-Bewegungen)
const WAVE_COOLDOWN = 2500;                           // Abklingzeit in ms nach dem Auslösen (kein sofortiges erneutes Löschen)

// Hilfsfunktion: simuliert ein echtes Maus-Ereignis an einer Bildschirmposition ───
function fireMouse(type, x, y) {                     // type = "mousemove" oder "click", x/y = Pixelposition
  const ev = new MouseEvent(type, {                  // Ein echtes MouseEvent-Objekt bauen
    clientX: x,                                      // Horizontale Position (wie bei einer echten Maus)
    clientY: y,                                      // Vertikale Position
    bubbles: true,                                   // Event soll im DOM "aufsteigen" (damit Listener es sicher fangen)
    cancelable: true                                 // Event darf abgebrochen werden (Standardverhalten)
  });
  canvas.dispatchEvent(ev);                          // Das Event auf dem Canvas auslösen – script.js reagiert wie auf eine echte Maus
}

// ── 1. Modell laden ──────────────────────────────────────────────
async function setup() {
  status.textContent = "camera: loading…";           // Statusanzeige aktualisieren
  const vision = await FilesetResolver.forVisionTasks(                       // Die WASM-Rechenbausteine von MediaPipe laden
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"      // Pfad zu den WASM-Dateien auf dem CDN
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {          // Das eigentliche Hand-Modell erstellen
    baseOptions: {
      modelAssetPath:                                                        // URL zur fertigen Modell-Datei (von Google gehostet, gratis)
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU"                                                        // Berechnung auf der Grafikkarte (schneller)
    },
    runningMode: "VIDEO",                                                    // Modus "VIDEO": fortlaufende Frames statt Einzelbild
    numHands: 1                                                              // Nur eine Hand verfolgen (reicht und spart Leistung)
  });
  await startCamera();                               // Kamera einschalten, sobald das Modell bereit ist
}

// ── 2. Kamera starten ────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true }); // Kamera-Erlaubnis anfragen und Stream holen
    video.srcObject = stream;                        // Den Kamera-Stream ins Video-Element stecken
    await video.play();                              // Video starten (liefert ab jetzt Frames)
    status.textContent = "camera: on";               // Statusanzeige: läuft
    status.style.color = "rgba(152,255,110,0.5)";    // Status grün einfärben (dein Akzentgrün)
    detect();                                        // Erkennungs-Schleife beginnen
  } catch (e) {                                      // Falls die Erlaubnis verweigert wird oder kein HTTPS vorliegt
    status.textContent = "camera: denied";           // Fehler anzeigen
    status.style.color = "rgba(255,90,90,0.6)";      // Status rot einfärben
  }
}

// ── 3. Erkennungs-Schleife (läuft pro Frame) ─────────────────────
function detect() {
  if (handLandmarker && video.readyState >= 2) {     // Nur erkennen, wenn Modell da ist und Video Bilddaten liefert
    const result = handLandmarker.detectForVideo(video, performance.now()); // Aktuellen Frame analysieren (Zeitstempel als 2. Argument)

    if (result.landmarks.length > 0) {               // Wurde mindestens eine Hand gefunden?
      const hand = result.landmarks[0];              // Die erste (einzige) erkannte Hand nehmen
      const indexTip = hand[8];                      // Landmark 8 = Spitze des Zeigefingers
      const thumbTip = hand[4];                      // Landmark 4 = Spitze des Daumens

      const targetX = (1 - indexTip.x) * window.innerWidth;  // Roh-Zielposition X: spiegeln + auf Fensterbreite skalieren
      const targetY = indexTip.y * window.innerHeight;       // Roh-Zielposition Y: auf Fensterhöhe skalieren

      if (smoothX === null) { smoothX = targetX; smoothY = targetY; } // Beim ersten Frame direkt setzen (kein Sprung vom Bildrand)
      smoothX += (targetX - smoothX) * SMOOTHING;    // Cursor ein Stück Richtung Ziel bewegen (glättet das Zittern)
      smoothY += (targetY - smoothY) * SMOOTHING;    // dasselbe für die Y-Achse
      const x = smoothX;                             // Ab hier mit der geglätteten Position weiterarbeiten
      const y = smoothY;                             // dasselbe für Y

      fireMouse("mousemove", x, y);                  // Maus an die Fingerposition bewegen (steuert deinen Cursor + Vorschaulinien)

      const dx = indexTip.x - thumbTip.x;            // Horizontaler Abstand Zeigefinger ↔ Daumen
      const dy = indexTip.y - thumbTip.y;            // Vertikaler Abstand Zeigefinger ↔ Daumen
      const dist = Math.hypot(dx, dy);               // Tatsächliche Distanz der Fingerspitzen (Satz des Pythagoras)
      const isPinch = dist < PINCH_DISTANCE;         // Sind sie nah genug zusammen? → Pinch erkannt

      if (isPinch && !lastPinch) {                   // Nur auslösen, wenn JETZT gepincht wird, vorher aber nicht
        fireMouse("mousemove", x, y);                // Sicherstellen, dass die Position vor dem Klick stimmt
        fireMouse("click", x, y);                    // "Klick" auslösen → script.js setzt einen Node an dieser Stelle
      }
      lastPinch = isPinch;                           // Pinch-Zustand für den nächsten Frame merken

      // ── Winke-Geste erkennen ──────────────────────────────────
      const now = performance.now();                 // Aktuelle Zeit (für die Zeitfenster-Logik)
      const wristX = hand[0].x;                       // Landmark 0 = Handgelenk; nehmen wir als stabile Handposition
      if (prevWristX === null) prevWristX = wristX;   // Beim allerersten Frame nur merken, noch nicht vergleichen
      const move = wristX - prevWristX;              // Wie weit hat sich die Hand seit dem letzten Vergleich bewegt?
      if (Math.abs(move) > WAVE_MIN_STEP) {          // Nur deutliche Bewegungen beachten (kleines Zittern ignorieren)
        const dir = move > 0 ? 1 : -1;               // Richtung bestimmen: rechts (+1) oder links (-1)
        if (prevDir !== 0 && dir !== prevDir) {      // Hat die Hand die Richtung umgekehrt?
          reversals.push(now);                       // Ja → Zeitpunkt dieses Richtungswechsels merken
        }
        prevDir = dir;                               // Aktuelle Richtung für den nächsten Vergleich speichern
        prevWristX = wristX;                         // Position nur bei deutlicher Bewegung aktualisieren
      }
      reversals = reversals.filter(t => now - t < WAVE_WINDOW); // Zu alte Richtungswechsel aus der Liste werfen
      if (reversals.length >= WAVE_REVERSALS && now - lastWaveTime > WAVE_COOLDOWN) { // Genug Wechsel im Zeitfenster + Abklingzeit vorbei?
        fireMouse("dblclick", x, y);                 // Doppelklick auslösen → script.js löscht alles
        lastWaveTime = now;                          // Auslöse-Zeitpunkt merken (startet die Abklingzeit)
        reversals = [];                              // Zähler zurücksetzen, damit es nicht sofort erneut auslöst
        status.textContent = "✦ cleared";            // Kurze Rückmeldung in der Statusanzeige
        setTimeout(() => { status.textContent = "camera: on"; }, 900); // Nach 0,9 s wieder normalen Status zeigen
      }
    } else {
      lastPinch = false;                             // Keine Hand sichtbar → Pinch-Zustand zurücksetzen
      smoothX = null; smoothY = null;                // Geglättete Position vergessen (kein Rutschen beim Wiederauftauchen)
      prevDir = 0;                                   // Winke-Richtung zurücksetzen (Hand ist ja weg)
      reversals = [];                                // Gesammelte Richtungswechsel verwerfen
      prevWristX = null;                             // Position vergessen, damit beim Wiederauftauchen sauber gestartet wird
    }
  }
  requestAnimationFrame(detect);                     // Browser bitten, detect() beim nächsten Frame erneut aufzurufen
}

setup();                                             // Alles starten
</script>

</body>                              <!-- Ende des sichtbaren Inhalts -->
</html>                              <!-- Ende des HTML-Dokuments -->
